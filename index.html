<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitchen Compass | Discover Recipes</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍴%3C/text%3E%3C/svg%3E"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <h1><i class="fas fa-compass"></i> Kitchen <span>Compass</span></h1>
        </div>
        <p class="tagline">Explore yummy recipes here</p>
        <p class="api-link">
          Api using here
          <a
            href="https://www.themealdb.com/api.php"
            target="_blank"
            style="text-decoration: none; color: #ff6b6b"
            >TheMealDB 🍔</a
          >
        </p>
      </header>

      <div class="search-section">
        <div class="search-container">
          <i class="fas fa-search search-icon">&nbsp</i>
          <div class="placeholder-wrapper">
            <input type="text" id="search-input" />
            <span id="placeholder-overlay">What are you craving?</span>
          </div>
          <button id="search-btn">Search</button>
        </div>
      </div>

      <div id="result-heading"></div>
      <div id="error-container"></div>
      <div id="meals-container" class="meals-grid"></div>
      <div id="meal-details" class="details-view" style="display: none"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
